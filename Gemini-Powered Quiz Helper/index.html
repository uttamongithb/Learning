<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gemini Quiz Helper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Gemini Quiz Helper</h1>

        <input type="text" id="topicInput" placeholder="Enter topic...">

        <button id="getQuestionBtn">Get Question</button>

        <div id="loader" class="hidden">Loading...</div>

        <div class="result">
            <h3>Question</h3>
            <p id="question"></p>

            <h3>Answer</h3>
            <p id="answer"></p>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
